<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartola PWA 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; background-color: #F4F4F4; }
        #app-content { padding-bottom: 120px; min-height: 100vh; }
        .nav-glass {
            background: rgba(255, 255, 255, 0.7); /* UM POUCO MAIS VISÍVEL PARA DAR FEEDBACK */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <main id="app-content">
        <div class="flex flex-col justify-center items-center h-screen text-gray-300">
            <i data-lucide="ballpoker" class="w-12 h-12 mb-2 opacity-10"></i>
            <p class="uppercase text-[10px] font-bold tracking-widest">Aguardando comando...</p>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md nav-glass border border-white/40 rounded-3xl shadow-2xl z-50 p-3">
        <div class="flex justify-around items-center">
            <button id="btn-jogos" class="flex flex-col items-center gap-1 transition-all active:scale-90 group">
                <i data-lucide="circle-dot" id="icon-ball" class="w-7 h-7 text-gray-400"></i>
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-[0.2em]">Jogos</span>
            </button>
        </div>
    </nav>

    <script src="./API/rotas_proxy.js"></script>
    <script src="./MENU/jogos_rodada.js"></script>
    <script>
        // ÍCONE DE BOLA DO LUCIDE (SUBSTITUIÇÃO MANUAL PARA GARANTIR)
        lucide.createIcons();
    </script>
</body>
</html>
