<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taça Nattos 2026 - Cartola BMP</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json?v=2">
    <meta name="theme-color" content="#FF6321">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Taça Nattos">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Teko:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cartola: {
                            orange: '#FF6321',
                            black: '#1A1A1A',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        teko: ['Teko', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F9FAFB;
            background-image: 
                radial-gradient(at 100% 0%, rgba(255, 99, 33, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(26, 26, 26, 0.02) 0px, transparent 50%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            border-radius: 24px;
        }
        
        .field-bg {
            background: #1e293b; /* Fallback dark blue */
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                url('/campo.png');
            background-size: 50px 50px, 50px 50px, cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-[1200px] mx-auto space-y-8">
        <!-- Header Container -->
        <header id="header" class="glass-card p-6"></header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Main Content Area -->
            <main id="main-content" class="lg:col-span-2"></main>

            <!-- Sidebar Area -->
            <aside id="sidebar"></aside>
        </div>

        <!-- Footer -->
        <footer class="py-12 text-center">
            <p class="text-[10px] font-mono text-gray-400 uppercase tracking-[0.3em]">
                Taça Nattos &copy; 2026 • Design by JOSA • Cartola BMP
            </p>
        </footer>
    </div>

    <!-- App Data -->
    <script src="status.js?v=6" onerror="console.warn('status.js não carregado como script')"></script>
    <script src="partidas.js?v=6" onerror="console.warn('partidas.js não carregado como script')"></script>
    <script src="tabela.js?v=6" onload="console.log('tabela.js carregado via onload')"></script>
    <script src="escalacoes.js?v=6" onload="console.log('escalacoes.js carregado via onload')"></script>
    <!-- App Logic -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Erro Global:', msg, url, lineNo, columnNo, error);
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:10px;z-index:9999;font-family:monospace;';
            errorDiv.innerHTML = '<b>Erro detectado:</b> ' + msg + '<br><b>Arquivo:</b> ' + url + '<br><b>Linha:</b> ' + lineNo;
            document.body.appendChild(errorDiv);
            return false;
        };
        console.log('Script inline executado');
    </script>
    <script src="script.js?v=6" onload="console.log('script.js carregado via onload')"></script>
</body>
</html>
