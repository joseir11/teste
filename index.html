<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartola 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; background-color: #F4F4F4; font-family: sans-serif; }
        #main-content { padding-bottom: 120px; min-height: 100vh; }
        .nav-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        /* ESTILO PARA O SVG DA BOLA */
        .icon-ball { fill: #9ca3af; transition: fill 0.2s; }
        button:hover .icon-ball { fill: #4b5563; }
    </style>
</head>
<body class="antialiased">

    <main id="main-content">
        <div class="flex flex-col justify-center items-center h-screen text-gray-300">
            <p class="uppercase text-[10px] font-bold tracking-[0.3em]">Aguardando seleção</p>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md nav-glass border border-white/40 rounded-3xl shadow-2xl z-50 p-4">
        <div class="flex justify-around items-center">
            
            <button id="btn-jogos" class="flex flex-col items-center gap-1 transition-all active:scale-95 group">
                <svg class="icon-ball w-7 h-7" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 2v4m0 12v4M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 12l-2-2m4 0l-2 2m0 4l-2-2m4 0l-2 2" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest group-hover:text-gray-600">Jogos</span>
            </button>

        </div>
    </nav>

    <script src="./API/rotas_proxy.js"></script>
    <script src="./MENU/jogos_rodada.js"></script>

</body>
</html>
