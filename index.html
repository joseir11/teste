<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>JOSA.BET_v2</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./IMAGES/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF6321">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF6321',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #F9FAFB;
      margin: 0;
      padding-bottom: 120px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #E5E7EB;
      border-top-color: #FF6321;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-thumb {
      background: #DDD;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>
<body class="font-sans">
  <main id="main-content" class="h-screen flex items-center justify-center">
    <p class="text-gray-500 text-center px-6">Aguardando seleção...</p>
  </main>

  <!-- NAV BAR FIXA NO TOPO DA TELA -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 p-4 bg-white/80 backdrop-blur-md border-t border-gray-100">
    <div class="flex justify-around">
      
      <!-- BOTÃO JOGOS (EXISTENTE) -->
      <button id="btn-jogos" 
              type="button"
              class="flex flex-col items-center active:scale-95 transition-transform">
        <span class="text-xs uppercase tracking-wider font-black">JOGOS</span>
      </button>
      
      <!-- NOVO BOTÃO PROVÁVEIS -->
      <button id="btn-provaveis" 
              type="button"
              class="flex flex-col items-center active:scale-95 transition-transform">
        <img src="./IMAGES/provaveis.png" class="w-6 h-6 mx-auto" alt="Prováveis Escalações">
        <span class="text-[10px] mt-2 block leading-none font-black">PROVÁVEIS</span>
      </button>
      
    </div>
  </nav>

  <!-- ARQUIVOS DE SCRIPT ESSENCIAIS -->
  <script src="./API/rotas_proxy.js"></script>
  <script src="./MENU/jogos_rodada.js"></script>

  <!-- REGISTRA O SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registrado:', reg.scope))
          .catch(err => console.error('Erro no SW:', err));
      });
    }
  </script>
</body>
</html>
