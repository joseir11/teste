<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>JOSA.BET</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./IMAGES/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF6321">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF6321',
          },
        },
      },
    };
  </script>
  <style>
    /* ===== FONTE CUSTOMIZADA ===== */
    @font-face {
      font-family: 'FontJogos';
      src: url('./FONTS/font_jogos.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body {
      background-color: #f9fafb;
      margin: 0;
      padding-bottom: 100px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #ff6321;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* ===== APLICA FONT_JOGOS NOS DESTAQUES ===== */

    /* Título "JOGOS DA RODADA", "ABERTO", "14", "02/05 15:59" */
    #main-content .text-primary,
    #main-content [class*="text-[#FF6321]"],
    #main-content [class*="text-orange"],
    #main-content [class*="text-green"],
    #main-content [class*="text-emerald"],
    /* Nomes dos times: BOT, FLA, PAL, REM, SAN... */
    #main-content .font-black,
    #main-content .font-bold {
      font-family: 'FontJogos', sans-serif !important;
    }

    /* Título "JOGOS DA RODADA": cor preta e tamanho igual ao "14" */
    #main-content .text-primary {
      color: #000 !important;
      font-size: 1.5rem !important;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body class="font-sans">
  <!-- CONTEÚDO PRINCIPAL (card "JOGOS DA RODADA" + jogos vêm aqui via JS) -->
  <main id="main-content" class="px-4 pt-4">
    <p class="text-gray-500 text-center mt-10">Aguardando seleção...</p>
  </main>

  <!-- NAV BAR FLUTUANTE FIXA NO RODAPÉ -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 p-4 bg-white/80 backdrop-blur-md border-t border-gray-100">
    <div class="flex justify-around items-center">
      <button
        id="btn-jogos"
        type="button"
        class="flex flex-col items-center active:scale-95 transition-transform"
      >
        <img src="./IMAGES/jogos.png" class="w-6 h-6 mx-auto" alt="Jogos da Rodada" />
        <span class="text-[10px] mt-2 block leading-none font-black">JOGOS</span>
      </button>

      <button
        id="btn-provaveis"
        type="button"
        class="flex flex-col items-center active:scale-95 transition-transform"
      >
        <img src="./IMAGES/ico_provaveis.png" class="w-6 h-6 mx-auto" alt="Prováveis Escalações" />
        <span class="text-[10px] mt-2 block leading-none font-black">PROVÁVEIS</span>
      </button>
    </div>
  </nav>

  <!-- SCRIPTS -->
  <script src="./API/rotas_proxy.js"></script>
  <script src="./MENU/jogos_rodada.js"></script>
  <script src="./MENU/provaveis.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('./sw.js')
          .then((reg) => console.log('SW registrado:', reg.scope))
          .catch((err) => console.error('Erro no SW:', err));
      });
    }
  </script>
</body>
</html>
