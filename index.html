  if (!historicoBruto || !Array.isArray(historicoBruto) || historicoBruto.length === 0) {
    return { ranking: [], rdd: rodadaAlvo || 0 };

  historicoBruto.forEach(item => { if (item && item.rdd > maxNoArquivo) maxNoArquivo = item.rdd; });

  const rddLimite = (rodadaAlvo && rodadaAlvo > 0) ? rodadaAlvo : maxNoArquivo;
  const agrupado = {};
  historicoBruto.forEach(item => {
    if (!item || item.rdd > rddLimite) return;
    if (!agrupado[item.nome]) agrupado[item.nome] = { nome:item.nome, total:0, somaRDD:0, somaRE:0, somaPEN:0, ultimaRDDVal:0, rodadas:[] };
    agrupado[item.nome].somaRDD += item.val || 0;
    agrupado[item.nome].somaRE  += item.re  || 0;
    agrupado[item.nome].somaPEN += item.pen  || 0;
    agrupado[item.nome].rodadas.push(item);
  });
  const lista = Object.values(agrupado).map(t => {
    t.total = (t.somaRDD + t.somaRE) - t.somaPEN;
    const ultima = t.rodadas.reduce((p,c) => p.rdd > c.rdd ? p : c, {val:0,rdd:0});
    t.ultimaRDDVal = ultima.val || 0;
    t.rodadas.sort((a,b) => b.rdd - a.rdd);
    return t;
  });
  lista.sort((a,b) => b.total - a.total);
  return { ranking: lista, rdd: rddLimite };
}

function atualizarSeletorRodadas() {
  const sel = document.getElementById('seletor-rodada');
  if (!sel) return;
  sel.innerHTML = '';
  for (let i = 1; i <= rodadaMaximaGlobal; i++) {
    const o = document.createElement('option');
    o.value = i;
    o.innerText = `Rodada ${String(i).padStart(2,'0')}`;
    if (i === rodadaSelecionada) o.selected = true;
    sel.appendChild(o);
  }
}

function alterarRodadaManual(rdd) {
  rodadaSelecionada = parseInt(rdd);
  document.getElementById('info-rdd-topo').innerText = `${String(rodadaSelecionada).padStart(2,'0')} / 19`;
  visualizandoTime && timeSelecionado ? mostrarTime(timeSelecionado) : atualizarTelas();
}

function buscarEscalacao(timeNome, rodada) {
  if (typeof bancoEscalacoes === 'undefined' || !bancoEscalacoes) return null;
  // Tenta o nome como veio, e também com _ no lugar de espaços
  const dados = bancoEscalacoes[timeNome] || bancoEscalacoes[timeNome.replace(/\s+/g,'_')];
  if (!dados) {
    console.warn('[ESC] Time não encontrado:', timeNome, '| Disponíveis:', Object.keys(bancoEscalacoes).slice(0,5));
    return null;
  }
  let i = 0;
  while (i < dados.length) {
    if (dados[i].rdd !== undefined && dados[i].rdd === rodada) {
      const formacao = dados[i].formacao;
      const jogadores = [];
      i++;
      while (i < dados.length && dados[i].rdd === undefined) { jogadores.push(dados[i]); i++; }
      return { formacao, jogadores };
    }
    i++;
  }
  console.warn('[ESC] Rodada', rodada, 'não encontrada para', timeNome);
  return null;
}

function mostrarTime(timeNome) {
  visualizandoTime = true;
  timeSelecionado = timeNome;
  document.querySelector('.bloco-series').style.display = 'none';
  document.getElementById('visualizacaoTopo').style.display = 'flex';
  document.getElementById('nomeTimeCentral').textContent = timeNome.replace(/_/g,' ');
  document.getElementById('displayA').innerHTML = '';
  document.getElementById('displayB').innerHTML = '';

  const containerId = serieAtiva === 'A' ? 'displayA' : 'displayB';
  const escalacao = buscarEscalacao(timeNome, rodadaSelecionada);
  let somaVal = 0;

  if (escalacao && escalacao.jogadores && escalacao.jogadores.length > 0) {
    renderEscalacao(escalacao.formacao, escalacao.jogadores, containerId);
    escalacao.jogadores.filter(j => j.status === 'T').forEach(j => { somaVal += j.val || 0; });
  } else {
    renderCampoLimpo(containerId);
  }

  const valEl = document.getElementById('valorizacaoRodada');
  valEl.textContent = somaVal.toFixed(2);
  valEl.classList.toggle('negativo', somaVal < 0);
}

function renderEscalacao(formacao, jogadores, containerId) {
  const posicoes = posicoesPorFormacao[String(formacao)];
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  if (!posicoes) { renderCampoLimpo(containerId); return; }

  const campo = document.createElement('div');
  campo.className = 'campo';
  const porPos = { GOL:[], ZAG:[], LAT:[], MEI:[], ATA:[], TEC:[] };
  jogadores.filter(j => j.status === 'T').forEach(j => { if (porPos[j.pos]) porPos[j.pos].push(j); });

  posicoes.forEach(posObj => {
    const fila = porPos[posObj.pos];
    if (!fila || !fila.length) return;
    const j = fila.shift();
    const neg = (j.val||0) < 0 ? 'negativo' : '';
    campo.innerHTML += `
      <div class="jogador-card" style="top:${posObj.t}%;left:${posObj.l}%">
        <img class="logo-clube-escalacao" src="TIMES/${j.clube||'default'}.png" alt="${j.clube||''}" onerror="this.src='TIMES/default.png'">
        <div class="nome-jogador">${j.nome||''}</div>
        <div class="valor-jogador ${neg}">${(j.val||0).toFixed(2)}</div>
      </div>`;
  });
  container.appendChild(campo);
}

function renderCampoLimpo(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  const d = document.createElement('div');
  d.className = 'campo-limpo';
  c.appendChild(d);
}

function voltarParaCampo() {
  visualizandoTime = false; timeSelecionado = null;
  document.querySelector('.bloco-series').style.display = 'flex';
  document.getElementById('visualizacaoTopo').style.display = 'none';
  const v = document.getElementById('valorizacaoRodada');
  v.textContent = '0.00'; v.classList.remove('negativo');
  atualizarTelas();
}

function atualizarTelas() {
  const resA = processarDados(typeof historicoSerieA !== 'undefined' ? historicoSerieA : [], rodadaSelecionada);
  const resB = processarDados(typeof historicoSerieB !== 'undefined' ? historicoSerieB : [], rodadaSelecionada);
  dadosSerieA = resA.ranking;
  dadosSerieB = resB.ranking;
  document.getElementById('info-rdd-topo').innerText = `${String(rodadaSelecionada).padStart(2,'0')} / 19`;
  atualizarSeletorRodadas();
  renderSeção('displayA', dadosSerieA, true);
  renderSeção('displayB', dadosSerieB, false);
}

function fecharTodosCards() {
  document.querySelectorAll('.pop-detalhes').forEach(c => c.style.display = 'none');
}

function alternarCard(e, id) {
  e.stopPropagation(); fecharTodosCards();
  document.querySelectorAll('.card-time').forEach(el => el.style.zIndex = '10');
  const card = document.getElementById('pop-' + id);
  if (card) { card.style.display = 'block'; card.parentElement.style.zIndex = '1000'; }
}

function renderSeção(id, data, isA) {
  const container = document.getElementById(id);
  if (!container) return;
  container.innerHTML = '';
  if (visualizandoTime) return;
  if (!data || !data.length) {
    container.innerHTML = '<div class="empty-message">Nenhum time encontrado</div>';
    return;
  }

  if (modoAtivo === 'campo') {
    const campo = document.createElement('div');
    campo.className = 'campo';
    campo.innerHTML += `<img src="TROFEU_NATTOS.png" class="trofeu-campo" style="top:${posTrofeu.t}%;left:${posTrofeu.l}%">`;
    data.forEach((time, i) => {
      const p = posCampo[i]; if (!p) return;
      const uid = id + i;
      const bClass = (isA && i >= 8) ? 'badge-rebaixamento' : (!isA && i <= 1) ? 'badge-lider' : '';
      if (i === 9) campo.innerHTML += `<img class="garcom" src="GARCONS/${time.nome}.png" style="top:${p.t}%;left:${p.l}%" onerror="this.style.display='none'">`;
      const hist = time.rodadas.map(r => `
        <div class="pop-grid-row">
          <span>${r.rdd}</span>
          <span style="color:#60a5fa">${(r.val||0).toFixed(2)}</span>
          <span style="color:#4ade80">${(r.re||0).toFixed(2)}</span>
          <span style="color:#f87171">${(r.pen||0).toFixed(2)}</span>
        </div>`).join('');
      campo.innerHTML += `
        <div class="card-time" style="top:${p.t}%;left:${p.l}%">
          <div class="pop-detalhes" id="pop-${uid}">
            <b>${time.nome.replace(/_/g,' ')}</b>
            <div class="pop-grid-header"><span>RD</span><span>VAL</span><span>RE</span><span>PEN</span></div>
            ${hist}
          </div>
          <div class="posicao-campo">${i+1}</div>
          <img class="logo-campo" src="ESCUDOS/${time.nome}.png" onclick="mostrarTime('${time.nome}')" onerror="this.src='ESCUDOS/default.png'">
          <div class="badge-pontos-campo ${bClass}" onclick="alternarCard(event,'${uid}')">
            ${(time.total||0).toFixed(2)}
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
        </div>`;
    });
    container.appendChild(campo);
  } else {
    let t = `<div class="lista-container"><table class="tabela-times">`;
    data.forEach((time, i) => {
      const rc = (isA && i >= 8) ? 'status-rebaixamento' : (!isA && i <= 1) ? 'status-lider' : '';
      const pos = i === 0 ? `<img src="TROFEU_NATTOS.png" style="width:20px;vertical-align:middle;">` : i+1;
      t += `<tr class="${rc}">
        <td class="td-posicao">${pos}</td>
        <td class="td-escudo"><img src="ESCUDOS/${time.nome}.png" onclick="mostrarTime('${time.nome}')" onerror="this.src='ESCUDOS/default.png'"></td>
        <td class="td-nome">${time.nome.replace(/_/g,' ')}</td>
        <td class="td-pontos">
          <span class="pontuacao-total">${(time.total||0).toFixed(2)}</span>
          <span class="detalhes-lista">ULT. RDD: ${(time.ultimaRDDVal||0).toFixed(2)} | RE: ${(time.somaRE||0).toFixed(2)} | PEN: ${(time.somaPEN||0).toFixed(2)}</span>
        </td></tr>`;
    });
    container.innerHTML = t + `</table></div>`;
  }
}

function mudarVisual(tipo) {
  modoAtivo = tipo;
  document.getElementById('btnCampo')?.classList.toggle('ativo', tipo === 'campo');
  document.getElementById('btnLista')?.classList.toggle('ativo', tipo === 'lista');
  if (!visualizandoTime) atualizarTelas();
}

function selecionarSerie(serie) {
  serieAtiva = serie;
  document.querySelectorAll('.btn-serie').forEach(b => b.classList.toggle('ativo', b.dataset.serie === serie));
  document.getElementById('containerA').style.display = serie === 'A' ? 'block' : 'none';
  document.getElementById('containerB').style.display = serie === 'B' ? 'block' : 'none';
}

// ── INICIALIZAÇÃO ────────────────────────────────────────
(function init() {
  if (typeof historicoSerieA === 'undefined') window.historicoSerieA = [];
  if (typeof historicoSerieB === 'undefined') window.historicoSerieB = [];
  if (typeof bancoEscalacoes  === 'undefined') window.bancoEscalacoes  = {};

  const resA = processarDados(historicoSerieA);
  rodadaSelecionada = resA.rdd || 1;
  if (rodadaSelecionada > rodadaMaximaGlobal) rodadaMaximaGlobal = rodadaSelecionada;

  atualizarSeletorRodadas();
  selecionarSerie('A');
  mudarVisual('campo');
})();
</script>
