<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartola 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; background-color: #F4F4F4; font-family: sans-serif; }
        /* ESPAÇO NO FUNDO PARA NÃO TAPAR O CONTEÚDO COM O MENU */
        #main-content { padding-bottom: 140px; min-height: 100vh; }
        
        .nav-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* ANIMAÇÃO SIMPLES DE CARREGAMENTO */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">

    <main id="main-content">
        <div class="flex flex-col justify-center items-center h-screen text-gray-400">
            <p class="uppercase text-[10px] font-bold tracking-[0.3em]">Aguardando seleção</p>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md nav-glass border border-gray-200 rounded-3xl shadow-2xl z-50 p-4">
        <div class="flex justify-around items-center">
            
            <button id="btn-jogos" class="flex flex-col items-center gap-1 transition-all active:scale-95 group">
                <img src="./IMAGES/jogos.png" alt="Jogos" class="w-8 h-8 object-contain">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest group-hover:text-black">Jogos</span>
            </button>

        </div>
    </nav>

    <script src="./API/rotas_proxy.js"></script>
    <script src="./MENU/jogos_rodada.js"></script>

</body>
</html>
